{{define "content"}}

      <div class="min-w-0 flex-1">
        <!-- Hero (mobile only — desktop has sidebar) -->
        <section class="border-b border-mauve-800 py-12 lg:hidden">
          <h1 class="mb-3 text-3xl font-semibold tracking-tight text-mauve-50">[Your Name]</h1>
          <p class="leading-relaxed text-mauve-400">[One or two sentences about who you are and what you care about.]</p>
          <div class="mt-6 flex gap-4 text-sm text-mauve-500">
            <a href="https://github.com/" target="_blank" rel="noopener" class="transition-colors hover:text-mauve-100">GitHub</a>
          </div>
        </section>

        <!-- Writing -->
        <section id="posts" class="border-b border-mauve-800 py-12">
          <ul class="space-y-6">
            <!-- Placeholder posts — replace with dynamic content from Rust server -->
            {{range .Projects}}
            <li>
              <div class="flex items-baseline justify-between gap-4">
                <a href="/projects/{{ .Metadata.Slug }}" class="font-medium text-mauve-100 transition-colors hover:text-violet-400">{{ .Metadata.Title }}</a>
                <span class="shrink-0 font-mono text-sm text-mauve-600">{{ .Metadata.Date }}</span>
              </div>
              <div class="mt-1 flex items-baseline justify-between gap-4">
                <p class="text-sm text-mauve-500">{{ .Metadata.Description }}</p>
                <div class="flex shrink-0 gap-1.5">
                  {{ range .Metadata.Tags}}
                  <span class="font-mono text-xs text-mauve-600 bg-mauve-800/50 px-1.5 py-0.5 rounded">
                      [{{ . }}]
                  </span>
                  {{ end }}
                </div>
              </div>
            </li>
            {{ end }}
          </ul>
        </section>
      </div>

{{end}}
